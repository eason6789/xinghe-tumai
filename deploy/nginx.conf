# 将以下 location 块添加到 tuteng3.site 的 Nginx server 配置中
# 位于 /etc/nginx/conf.d/tuteng3.site.conf

# API 转发到 Node.js 服务
location /xinghe-tumai/api/ {
    proxy_pass http://127.0.0.1:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
}

# 静态文件 (SPA)
location /xinghe-tumai/ {
    alias /var/www/landingPage/xinghe-tumai/;
    index index.html;
    try_files $uri $uri/ /xinghe-tumai/index.html;
}
